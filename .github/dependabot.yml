version: 2
updates:
  # Dashboard depends on @anthropic-ai/sdk directly — the Model type union
  # there is our source of truth for "latest Claude models" (see
  # packages/core/src/models/discover.ts). Keeping it current is how new
  # model IDs (e.g. opus 4.7) surface in the dropdown without manual edits.
  - package-ecosystem: npm
    directory: /packages/dashboard
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    allow:
      - dependency-name: "@anthropic-ai/sdk"
      - dependency-name: "@anthropic-ai/claude-agent-sdk"
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - sdk-bump

  - package-ecosystem: npm
    directory: /packages/core
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    allow:
      - dependency-name: "@anthropic-ai/claude-agent-sdk"
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - sdk-bump
